[workspace]
authors = ["Vaibhav Venkat <vaibhav@vaibhavvenkat.com>"]
channels = ["conda-forge", "main", "r", "msys2"]
name = "sap"
platforms = ["osx-arm64"]
version = "0.1.0"

[tasks]

[dependencies]
python = "3.14.*"
hoomd = "7.0.1.*"
gsd = "4.2.0.*"
numpy = "2.4.2.*"
matplotlib = "3.10.8.*"
pip = "*"
setuptools = "*"
wheel = "*"
scipy = ">=1.17.1,<2"
plotly = ">=6.8.0,<7"
scikit-learn = ">=1.9.0,<2"
numba = ">=0.65.1,<0.66"
pysr = ">=1.5.10,<2"

[pypi-dependencies]
pysindy = { version = ">=2.1.0, <3", extras = ["miosr", "sbr", "cvxpy"] }
