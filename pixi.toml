[workspace]
authors = ["Vaibhav Venkat <vaibhav@vaibhavvenkat.com>"]
channels = ["conda-forge", "main", "r", "msys2"]
name = "sap"
platforms = ["osx-arm64", "linux-64"]
version = "0.1.0"

[tasks]
rho-fitting-build = "maturin develop --manifest-path packages/rho-fitting-core/Cargo.toml --features gpu-metal --release"
rho-fitting-build-cuda = "maturin develop --manifest-path packages/rho-fitting-core/Cargo.toml --release --features gpu-cuda"
rho-fitting-build-gpu = "maturin develop --manifest-path packages/rho-fitting-core/Cargo.toml --release --features gpu"
cargo-check = "cargo check --workspace --all-features"
cargo-fmt-check = "cargo fmt --all --check"
linalg-check = "cd packages/linalg && zig build -Dbackend=accelerate check"
linalg-test = "cd packages/linalg && zig build -Dbackend=accelerate test"
safetensors-check = "cd packages/safetensors && zig build check"
safetensors-test = "cd packages/safetensors && zig build test"
dynamics-analysis-check = "cd packages/dynamics_analysis && zig build -Dbackend=accelerate check"
dynamics-analysis-test = "cd packages/dynamics_analysis && zig build -Dbackend=accelerate test"
dynamics-analysis-build = "cd packages/dynamics_analysis && zig build -Dbackend=accelerate -Doptimize=ReleaseFast"
dynamics-analysis-build-cuda = "cd packages/dynamics_analysis && zig build -Dbackend=cuda -Dcuda-path=${CUDA_HOME:-/usr/local/cuda} -Doptimize=ReleaseFast"
dynamics-analysis-plot = "python -m hexatic.big_lx_analysis.run_dynamics"
big-lx-analysis-plot = "python -m hexatic.big_lx_analysis.run_all"
laplacian-analysis-check = "cd packages/laplacian_analysis && zig build check"
laplacian-analysis-test = "cd packages/laplacian_analysis && zig build test"
laplacian-analysis-build = "cd packages/laplacian_analysis && zig build -Doptimize=ReleaseFast"
laplacian-analysis-build-cuda = "cd packages/laplacian_analysis && zig build -Dbackend=cuda -Dcuda-path=${CUDA_HOME:-/usr/local/cuda} -Doptimize=ReleaseFast"
cluster-analysis-check = "cd packages/cluster_analysis && zig build check"
cluster-analysis-test = "cd packages/cluster_analysis && zig build test"
cluster-analysis-build = "cd packages/cluster_analysis && zig build -Doptimize=ReleaseFast"
rho-fitting-smoke = "python -um hexatic.rho_fitting --case radius_15D --nd 1000 --no-plot"
rho-fitting = "RHO_FITTING_GPU=1 python -um hexatic.rho_fitting --overwrite --nd 100000"
rho-fitting-lite = "RHO_FITTING_GPU=1 python -um hexatic.rho_fitting --overwrite --nd 20000"
rho-fitting-regression= "RHO_FITTING_GPU=1 python -um hexatic.rho_fitting --overwrite --nd 100000 --fit-only"
rho-fitting-corr = "RHO_FITTING_GPU=1 python -um hexatic.rho_fitting --overwrite --correlations-only --no-plot --nd 10000"
rho-plot = "python -um hexatic.rho_fitting"
pde-validate="python -um hexatic.rho_fitting.pde_validation --case radius_15D --mode all --overwrite"
pde-diagnostic="python -um hexatic.rho_fitting.pde_validation --case radius_15D --mode all --no-plot --overwrite"
pde-plot="python -um hexatic.rho_fitting.pde_validation --case radius_15D --mode all --plot-only --overwrite"
unwrapped-sweep = "python -um hexatic.unwrapped_analysis.run_sweep --all --overwrite"
unwrapped-analysis = "python -um hexatic.unwrapped_analysis.run_analysis --all --overwrite --skip-shear-series"
big-lx-gpu-check = "python -um hexatic.big_lx.gpu_check"
big-lx-validate = "python -um hexatic.big_lx.validate_cases"
big-lx-sweep = "python -um hexatic.big_lx.run_sweep"
big-lx-analysis = "python -um hexatic.big_lx.run_analysis"
big-lx-pipeline = "python -um hexatic.big_lx.run_pipeline"
big-lx-dry-run = "python -um hexatic.big_lx.run_pipeline --dry-run"
confinement-gpu-check = "python -um hexatic.confinement_comparison.gpu_check"
confinement-validate = "python -um hexatic.confinement_comparison.validate_cases --all"
confinement-diagnostic = "python -um hexatic.confinement_comparison.diagnostic --all"
confinement-sweep = "python -um hexatic.confinement_comparison.run_sweep"
confinement-analysis = "python -um hexatic.confinement_comparison.run_analysis"
confinement-pipeline = "python -um hexatic.confinement_comparison.run_pipeline"
confinement-dry-run = "python -um hexatic.confinement_comparison.run_pipeline --all --dry-run"
passive-dense-validate = "python -um hexatic.confinement_comparison.passive_dense.validate_initial --all"
passive-dense-pipeline = "python -um hexatic.confinement_comparison.passive_dense.run_pipeline"
passive-dense-dry-run = "python -um hexatic.confinement_comparison.passive_dense.run_pipeline --all --dry-run"
passive-dense-laplace = "python -um hexatic.confinement_comparison.passive_dense.analyze_laplace"
passive-dense-com = "python -um hexatic.confinement_comparison.passive_dense.plot_com"
[dependencies]
python = "3.13.*"
hoomd = "7.0.1.*"
gsd = "4.2.0.*"
numpy = "2.4.2.*"
matplotlib = "3.10.8.*"
pip = "*"
setuptools = "*"
wheel = "*"
scipy = ">=1.17.1,<2"
seaborn = ">=0.13.2,<0.14"
safetensors = ">=0.5,<1"
plotly = ">=6.8.0,<7"
scikit-learn = ">=1.9.0,<2"
numba = ">=0.65.1,<0.66"
pysr = ">=1.5.10,<2"
rust = "*"
maturin = "*"
rust-analyzer = "*"
ty = ">=0.0.56,<0.0.57"
rust-src = ">=1.96.0,<2"

[pypi-dependencies]
pysindy = { version = ">=2.1.0, <3", extras = ["miosr", "sbr", "cvxpy"] }
desloppify = ">=1.0, <2"

[feature.big-lx-cuda12]
platforms = ["linux-64"]

[feature.big-lx-cuda12.dependencies]
hoomd = { version = "7.0.1.*", build = "*gpu*" }
cuda-version = "12.*"

[feature.big-lx-cuda12.pypi-dependencies]
jax = { version = ">=0.10.2,<0.11", extras = ["cuda12"] }

[feature.big-lx-cuda12.system-requirements]
cuda = "12.9"

[environments]
big-lx-cuda12 = ["big-lx-cuda12"]
