[workspace]
authors = ["Vaibhav Venkat <vaibhav@vaibhavvenkat.com>"]
channels = ["conda-forge", "main", "r", "msys2"]
name = "sap"
platforms = ["osx-arm64", "linux-64"]
version = "0.1.0"

[tasks]
rho-fitting-build = "maturin develop --manifest-path rust/rho_fitting_core/Cargo.toml --features gpu-metal --release"
rho-fitting-build-cuda = "maturin develop --manifest-path rust/rho_fitting_core/Cargo.toml --release --features gpu-cuda"
rho-fitting-build-gpu = "maturin develop --manifest-path rust/rho_fitting_core/Cargo.toml --release --features gpu"
rho-fitting-smoke = "python -um hexatic.rho_fitting --case radius_15D --nd 1000 --no-plot"
rho-fitting = "RHO_FITTING_GPU=1 python -um hexatic.rho_fitting --overwrite --nd 100000"
rho-fitting-lite = "RHO_FITTING_GPU=1 python -um hexatic.rho_fitting --overwrite --nd 20000"
rho-fitting-regression= "RHO_FITTING_GPU=1 python -um hexatic.rho_fitting --overwrite --nd 100000 --fit-only"
rho-fitting-corr = "RHO_FITTING_GPU=1 python -um hexatic.rho_fitting --overwrite --correlations-only --no-plot --nd 10000"
rho-plot = "python -um hexatic.rho_fitting"
pde-validate="python -um hexatic.rho_fitting.pde_validation --case radius_15D --mode all --overwrite"
pde-diagnostic="python -um hexatic.rho_fitting.pde_validation --case radius_15D --mode all --no-plot --overwrite"
pde-plot="python -um hexatic.rho_fitting.pde_validation --case radius_15D --mode all --plot-only --overwrite"
unwrapped-sweep = "python -um hexatic.unwrapped_analysis.run_sweep --all"

[dependencies]
python = "3.13.*"
hoomd = "7.0.1.*"
gsd = "4.2.0.*"
numpy = "2.4.2.*"
matplotlib = "3.10.8.*"
pip = "*"
setuptools = "*"
wheel = "*"
scipy = ">=1.17.1,<2"
plotly = ">=6.8.0,<7"
scikit-learn = ">=1.9.0,<2"
numba = ">=0.65.1,<0.66"
pysr = ">=1.5.10,<2"
rust = "*"
maturin = "*"
rust-analyzer = "*"
ty = ">=0.0.56,<0.0.57"
shenfun = ">=4.3.0,<4.4"
mpi4py = ">=4.0,<5"
mpi4py-fft = ">=2.0,<3"
sympy = ">=1.14,<2"

[pypi-dependencies]
pysindy = { version = ">=2.1.0, <3", extras = ["miosr", "sbr", "cvxpy"] }
desloppify = ">=1.0, <2"
