[package]
name = "rho_fitting_core"
version = "0.1.0"
edition = "2021"
description = "Rust numerical core for hexatic rho fitting"

[lib]
name = "_rho_fitting_core"
crate-type = ["cdylib", "rlib"]

[dependencies]
ndarray = "0.16"
num-complex = "0.4"
numpy = "0.29"
pyo3 = { version = "0.29", features = ["extension-module"] }
rand = "0.8"
rand_chacha = "0.3"
rustfft = "6"
thiserror = "2"
cubecl = { version = "0.10", optional = true }
cubecl-wgpu = { version = "0.10", optional = true }
rayon = { version = "1", optional = true }

[features]
default = []
gpu-metal = ["cubecl", "cubecl-wgpu"]
parallel = ["rayon"]

[package.metadata.maturin]
module-name = "hexatic.rho_fitting._rho_fitting_core"
python-source = "../.."
