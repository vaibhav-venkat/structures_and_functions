[build-system]
requires = ["maturin>=1.8,<2"]
build-backend = "maturin"

[project]
name = "hexatic-rho-fitting-core"
dynamic = ["version"]
requires-python = ">=3.12"
description = "PyO3 bindings for the hexatic rho-fitting numerical pipeline"
readme = "README.md"
dependencies = ["numpy>=2"]

[tool.maturin]
module-name = "hexatic.rho_fitting._rho_fitting_core"
python-source = "../.."
manifest-path = "Cargo.toml"
features = ["gpu-metal"]
editable-profile = "dev"
profile = "release"
