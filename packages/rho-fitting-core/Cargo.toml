[package]
name = "rho_fitting_core"
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true
description = "Rust numerical core for hexatic rho fitting"

[lints]
workspace = true

[lib]
name = "_rho_fitting_core"
crate-type = ["cdylib", "rlib"]

[dependencies]
ndarray.workspace = true
numpy.workspace = true
pyo3.workspace = true
rho-fitting-gpu = { path = "../../crates/rho_fitting_gpu" }
rho-fitting-numerics = { path = "../../crates/rho_fitting_numerics" }
rho-fitting-types = { path = "../../crates/rho_fitting_types" }

[features]
default = []
gpu-metal = ["rho-fitting-gpu/gpu-metal"]
gpu-cuda = ["rho-fitting-gpu/gpu-cuda"]
gpu = ["gpu-metal", "gpu-cuda"]
parallel = []
